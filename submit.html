<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Send Rajesh a Reminder</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #f5f2ed;
  --bg2: #ece8e1;
  --surface: #ffffff;
  --border: #ddd9d2;
  --border2: #ccc8c0;
  --text: #1a1814;
  --text2: #6b6760;
  --text3: #aaa8a3;
  --accent: #2d5a3d;
  --accent-light: #e8f0ea;
  --red: #c0392b;
  --red-light: #fdecea;
  --radius: 12px;
  --radius-sm: 8px;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.5;
}

.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 20px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}

.logo {
  font-family: 'Lora', serif;
  font-size: 26px;
  font-style: italic;
  color: var(--accent);
  margin-bottom: 4px;
}

.subtitle {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 24px;
  line-height: 1.7;
}

.field-label {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
  margin-top: 16px;
  display: block;
}
.field-label:first-of-type { margin-top: 0; }

.field-input {
  width: 100%;
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 13px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--text);
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.2s;
  resize: none;
}
.field-input:focus { border-color: var(--accent); background: white; }
.field-input::placeholder { color: var(--text3); font-size: 13px; }

/* Category chips */
.cat-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 2px;
}
.cat-chip {
  padding: 6px 11px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--bg2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text2);
  cursor: pointer;
  user-select: none;
  transition: all 0.15s;
  white-space: nowrap;
}
.cat-chip.sel-work     { background: #e8f0f7; color: #2c5f8a; border-color: rgba(44,95,138,0.4); }
.cat-chip.sel-personal { background: #e8f0ea; color: #2d5a3d; border-color: rgba(45,90,61,0.4); }
.cat-chip.sel-health   { background: #fdecea; color: #c0392b; border-color: rgba(192,57,43,0.4); }
.cat-chip.sel-home     { background: #fdf6e3; color: #b8860b; border-color: rgba(184,134,11,0.4); }
.cat-chip.sel-learning { background: #f0eaf5; color: #7c4b96; border-color: rgba(124,75,150,0.4); }
.cat-chip.sel-finance  { background: #e6f5f3; color: #1a7a6e; border-color: rgba(26,122,110,0.4); }

/* Submit button */
.submit-btn {
  width: 100%;
  margin-top: 20px;
  padding: 13px;
  border-radius: var(--radius-sm);
  background: var(--accent);
  border: none;
  color: white;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.15s;
}
.submit-btn:active { transform: scale(0.98); background: #1e3d2a; }
.submit-btn:disabled { background: var(--text3); cursor: not-allowed; transform: none; }

/* States */
.success-state {
  display: none;
  text-align: center;
  padding: 20px 0 10px;
}
.success-icon { font-size: 40px; margin-bottom: 12px; }
.success-title {
  font-family: 'Lora', serif;
  font-size: 20px;
  font-style: italic;
  color: var(--accent);
  margin-bottom: 8px;
}
.success-sub { font-size: 11px; color: var(--text3); line-height: 1.8; }

.send-another {
  margin-top: 20px;
  width: 100%;
  padding: 11px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.send-another:active { background: var(--bg2); }

.error-msg {
  font-size: 11px;
  color: var(--red);
  margin-top: 10px;
  display: none;
  background: var(--red-light);
  border: 1px solid rgba(192,57,43,0.2);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  line-height: 1.6;
}

.footer {
  margin-top: 20px;
  font-size: 10px;
  color: var(--text3);
  text-align: center;
  line-height: 1.8;
}
</style>
</head>
<body>
<div class="page">
  <div class="card">

    <!-- Form state -->
    <div id="formState">
      <div class="logo">TaskFlow</div>
      <div class="subtitle">Send Rajesh a reminder or task.<br>He'll see it next time he opens his app.</div>

      <label class="field-label">Your name</label>
      <input class="field-input" id="senderName" placeholder="Who is this from..." autocorrect="off" />

      <label class="field-label">Reminder / Task</label>
      <textarea class="field-input" id="taskTitle" placeholder="What should Rajesh do..." rows="3" autocorrect="off"></textarea>

      <label class="field-label">Category (optional)</label>
      <div class="cat-row">
        <div class="cat-chip" id="chip-work"     onclick="selectCat('work')">💼 Work</div>
        <div class="cat-chip" id="chip-personal" onclick="selectCat('personal')">👤 Personal</div>
        <div class="cat-chip" id="chip-health"   onclick="selectCat('health')">💪 Health</div>
        <div class="cat-chip" id="chip-home"     onclick="selectCat('home')">🏠 Home</div>
        <div class="cat-chip" id="chip-learning" onclick="selectCat('learning')">📚 Learning</div>
        <div class="cat-chip" id="chip-finance"  onclick="selectCat('finance')">💰 Finance</div>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="submitReminder()">Send Reminder</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- Success state -->
    <div class="success-state" id="successState">
      <div class="success-icon">✅</div>
      <div class="success-title">Reminder sent!</div>
      <div class="success-sub">Rajesh will see it next time<br>he opens his TaskFlow app.</div>
      <button class="send-another" onclick="resetForm()">Send another reminder</button>
    </div>

  </div>

  <div class="footer">
    Powered by TaskFlow · Personal task manager
  </div>
</div>

<script>
// ── Paste your Supabase credentials here ──
const SUPABASE_URL = 'https://yucqyokyppggzmspbibt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1Y3F5b2t5cHBnZ3ptc3BiaWJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTIwMDEsImV4cCI6MjA4ODg4ODAwMX0.VmYFnvzxCTWXK96gd37I3SVgdV6L1Um1_5r0bR11PxM';
// ──────────────────────────────────────────

let selectedCat = '';

function selectCat(cat) {
  selectedCat = cat;
  document.querySelectorAll('.cat-chip').forEach(c => {
    c.className = 'cat-chip';
  });
  document.getElementById('chip-' + cat).classList.add('sel-' + cat);
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function getToday() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function submitReminder() {
  const name  = document.getElementById('senderName').value.trim();
  const title = document.getElementById('taskTitle').value.trim();
  const errEl = document.getElementById('errorMsg');
  const btn   = document.getElementById('submitBtn');

  errEl.style.display = 'none';

  if (!title) {
    errEl.textContent = 'Please enter a reminder or task.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending…';

  try {
    // 1. Fetch current data
    const r = await fetch(`${SUPABASE_URL}/rest/v1/tasks?id=eq.main&select=data`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    if (!r.ok) throw new Error('Could not reach the server.');
    const arr = await r.json();
    if (!arr.length) throw new Error('No task data found.');

    const data = arr[0].data;
    data.tasks = data.tasks || [];

    // 2. Build the new task
    const label = name ? `📨 ${name}: ${title}` : `📨 ${title}`;
    const newTask = {
      id: uid(),
      title: label,
      date: getToday(),
      done: false,
      isDaily: false,
      rolledOver: false,
      snoozedTo: null,
      category: selectedCat || null,
      fromOther: true,
      senderName: name || 'Someone',
      createdAt: new Date().toISOString()
    };

    data.tasks.unshift(newTask);

    // 3. Save back
    const s = await fetch(`${SUPABASE_URL}/rest/v1/tasks?id=eq.main`, {
      method: 'PATCH',
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        Prefer: 'return=minimal'
      },
      body: JSON.stringify({ data, updated_at: new Date().toISOString() })
    });
    if (!s.ok) throw new Error('Failed to save. Please try again.');

    // Show success
    document.getElementById('formState').style.display = 'none';
    document.getElementById('successState').style.display = 'block';

  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Send Reminder';
  }
}

function resetForm() {
  document.getElementById('senderName').value = '';
  document.getElementById('taskTitle').value = '';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').textContent = 'Send Reminder';
  document.querySelectorAll('.cat-chip').forEach(c => c.className = 'cat-chip');
  selectedCat = '';
  document.getElementById('formState').style.display = 'block';
  document.getElementById('successState').style.display = 'none';
}
</script>
</body>
</html>
